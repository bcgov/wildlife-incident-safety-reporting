# Production values for the Crunchy PostgreSQL chart.
# Selected by .github/workflows/.deployer.yml when inputs.environment == 'prod'.
# Replaces values.yml for prod deploys (single-file selection via bcgov/action-crunchy).
crunchy:
  instances:
    replicas: 2
    dataVolumeClaimSpec:
      storage: 10Gi
      walStorage: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi

  proxy:
    pgBouncer:
      replicas: 2

  pgBackRest:
    enabled: true
    backupPath: /backups/prod/cluster/version
    clusterCounter: 1
    retentionFullType: count
    s3:
      enabled: true
      retention: 7
      # bucket / endpoint / accessKey / secretKey are injected via secrets at deploy time
      bucket: ~
      endpoint: ~
      accessKey: ~
      secretKey: ~
      fullBackupSchedule: "0 3 * * 0"
      incrementalBackupSchedule: "0 1 * * 1-6"
    pvc:
      retention: 1
      retentionFullType: count
      fullBackupSchedule: "0 4 * * 0"
      incrementalBackupSchedule: "0 1 * * 1-6"
      volume:
        accessModes: "ReadWriteOnce"
        storage: 10Gi
        storageClassName: netapp-file-backup
