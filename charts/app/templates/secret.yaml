{{- if and .Values.global.secrets .Values.global.secrets.enabled }}
{{- $databaseUser := printf "" }}
{{- $databasePassword := printf "" }}
{{- $databaseName := printf "" }}
{{- $hostWithoutPort := printf "" }}
{{- $port := printf "" }}
{{- $secretName := printf "%s-pguser-%s" .Values.global.databaseAlias .Values.global.config.databaseUser }}

{{- $databaseUser = .Values.global.config.databaseUser }}
{{- $secretObj := (lookup "v1" "Secret" .Release.Namespace $secretName ) }}
{{- $secretData := (and $secretObj (get $secretObj "data")) }}

{{- if not (and $secretObj $secretData) }}
# NOTE: Secret '{{ $secretName }}' or its 'data' section not found in namespace '{{ .Release.Namespace }}'. Dependent Secret resources will not be rendered.
{{- end }}

{{- if and $secretObj $secretData }}

# password stays base64-encoded from the source secret (other fields are decoded for formatting)
{{- $databasePassword = get $secretData "password" }}
{{- $databaseName = b64dec (get $secretData "dbname") }}
{{- $hostWithoutPort = printf "%s" (b64dec (get $secretData "host")) }}
{{- $port = printf "%s" (b64dec (get $secretData "port")) }}

---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-backend
  labels: {{- include "labels" . | nindent 4 }}
  {{- if .Values.global.secrets.persist }}
  annotations:
    helm.sh/resource-policy: keep
  {{- end }}
data:
  DB_HOST: {{ $hostWithoutPort | b64enc | quote }}
  DB_PORT: {{ $port | b64enc | quote }}
  DB_NAME: {{ $databaseName | b64enc | quote }}
  DB_USER: {{ $databaseUser | b64enc | quote }}
  DB_PASSWORD: {{ $databasePassword | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-migrations
  labels: {{- include "labels" . | nindent 4 }}
  {{- if .Values.global.secrets.persist }}
  annotations:
    helm.sh/resource-policy: keep
  {{- end }}
data:
  DB_HOST: {{ $hostWithoutPort | b64enc | quote }}
  DB_PORT: {{ $port | b64enc | quote }}
  DB_NAME: {{ $databaseName | b64enc | quote }}
  DB_USER: {{ $databaseUser | b64enc | quote }}
  DB_PASSWORD: {{ $databasePassword | quote }}
{{- end }}

---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-app-config
  labels: {{- include "labels" . | nindent 4 }}
  {{- if .Values.global.secrets.persist }}
  annotations:
    helm.sh/resource-policy: keep
  {{- end }}
stringData:
  KEYCLOAK_URL: {{ .Values.backend.config.keycloakUrl | default "" | quote }}
  KEYCLOAK_REALM: {{ .Values.backend.config.keycloakRealm | default "" | quote }}
  KEYCLOAK_CLIENT_ID: {{ .Values.backend.config.keycloakClientId | default "" | quote }}
  SITEMINDER_LOGOUT_URL: {{ .Values.backend.config.siteminderLogoutUrl | default "" | quote }}
  HMCR_API_URL: {{ .Values.backend.config.hmcrApiUrl | default "" | quote }}
  HMCR_TOKEN_URL: {{ .Values.backend.config.hmcrTokenUrl | default "" | quote }}
  HMCR_ID: {{ .Values.backend.config.hmcrId | default "" | quote }}
  HMCR_SECRET: {{ .Values.backend.config.hmcrSecret | default "" | quote }}
  GOOGLE_MAPS_CLIENT_API_KEY: {{ .Values.backend.config.googleMapsClientApiKey | default "" | quote }}
  BASE_MAP_STYLE_URL: {{ .Values.backend.config.baseMapStyleUrl | default "" | quote }}
  CORS_ORIGIN: {{ printf "https://%s" (include "backend.host" .) | quote }}
  PORT: {{ .Values.backend.config.port | default "3033" | quote }}

{{- if .Values.backend.seed.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-seed
  labels: {{- include "labels" . | nindent 4 }}
  {{- if .Values.global.secrets.persist }}
  annotations:
    helm.sh/resource-policy: keep
  {{- end }}
stringData:
  S3_ENDPOINT_URL: {{ .Values.backend.seed.s3.endpointUrl | default "" | quote }}
  S3_BUCKET: {{ .Values.backend.seed.s3.bucket | default "" | quote }}
  S3_ACCESS_KEY: {{ .Values.backend.seed.s3.accessKey | default "" | quote }}
  S3_SECRET_KEY: {{ .Values.backend.seed.s3.secretKey | default "" | quote }}
{{- end }}

{{- end }}
