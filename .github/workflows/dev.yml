name: Deploy to DEV

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '.github/graphics/**'
      - '.github/**'
      - '!.github/workflows/**'
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy; defaults to commit SHA"
        type: string
        required: false

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions: {}

jobs:
  builds:
    name: Builds
    permissions:
      packages: write
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        package: [backend, migrations, seed]
        include:
          - package: backend
            build_context: .
            build_file: Dockerfile
            triggers: "('src/' 'package.json' 'bun.lock' 'vite.config.js' 'tsconfig.json' 'Dockerfile')"
          - package: migrations
            build_context: .
            build_file: Dockerfile.migrations
            triggers: "('migrations/' 'src/services/database/' 'Dockerfile.migrations')"
          - package: seed
            build_context: .
            build_file: Dockerfile.seed
            triggers: "('scripts/' 'src/services/database/' 'Dockerfile.seed' 'package.json' 'bun.lock')"
    timeout-minutes: 10
    steps:
      - uses: bcgov/action-builder-ghcr@2b24ac7f95e6a019064151498660437cca3202c5 # v4.2.1
        with:
          package: ${{ matrix.package }}
          build_context: ${{ matrix.build_context }}
          build_file: ${{ matrix.build_file }}
          tags: |
            ${{ inputs.tag || github.sha }}
            latest
          tag_fallback: latest
          triggers: ${{ matrix.triggers }}

  deploy:
    name: Deploy (DEV)
    needs: [builds]
    uses: ./.github/workflows/.deployer.yml
    secrets:
      oc_namespace: ${{ secrets.OC_NAMESPACE }}
      oc_token: ${{ secrets.OC_TOKEN }}
    with:
      environment: dev
      tag: ${{ inputs.tag || github.sha }}
      params: --set global.secrets.persist=false
      db_triggers: ('charts/crunchy/')

  results:
    name: Dev Results
    needs: [builds, deploy]
    if: always()
    runs-on: ubuntu-slim
    steps:
      - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: echo "At least one job has failed." && exit 1
      - run: echo "Success!"
