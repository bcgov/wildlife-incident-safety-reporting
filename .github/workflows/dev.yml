name: Deploy to DEV

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '.github/graphics/**'
      - '.github/**'
      - '!.github/workflows/**'
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy; defaults to commit SHA"
        type: string
        required: false

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions: {}

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-24.04
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      migrations: ${{ steps.filter.outputs.migrations }}
      seed: ${{ steps.filter.outputs.seed }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            backend:
              - 'src/**'
              - 'package.json'
              - 'bun.lock'
              - 'vite.config.js'
              - 'tsconfig.json'
              - 'postcss.config.mjs'
              - 'Dockerfile'
            migrations:
              - 'migrations/**'
              - 'src/services/database/**'
              - 'Dockerfile.migrations'
            seed:
              - 'scripts/**'
              - 'src/services/database/**'
              - 'Dockerfile.seed'
              - 'package.json'
              - 'bun.lock'

  build-backend:
    name: Build backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    permissions:
      packages: write
      id-token: write
      attestations: write
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: bcgov/action-builder-ghcr@de3d575cf158e16f5dc2789630f6d587483b911c # v4.4.0
        with:
          package: backend
          build_context: .
          build_file: Dockerfile
          tags: |
            ${{ inputs.tag || github.sha }}
            latest
          tag_fallback: latest

  build-migrations:
    name: Build migrations
    needs: changes
    if: needs.changes.outputs.migrations == 'true'
    permissions:
      packages: write
      id-token: write
      attestations: write
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: bcgov/action-builder-ghcr@de3d575cf158e16f5dc2789630f6d587483b911c # v4.4.0
        with:
          package: migrations
          build_context: .
          build_file: Dockerfile.migrations
          tags: |
            ${{ inputs.tag || github.sha }}
            latest
          tag_fallback: latest

  build-seed:
    name: Build seed
    needs: changes
    if: needs.changes.outputs.seed == 'true'
    permissions:
      packages: write
      id-token: write
      attestations: write
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: bcgov/action-builder-ghcr@de3d575cf158e16f5dc2789630f6d587483b911c # v4.4.0
        with:
          package: seed
          build_context: .
          build_file: Dockerfile.seed
          tags: |
            ${{ inputs.tag || github.sha }}
            latest
          tag_fallback: latest

  deploy:
    name: Deploy (DEV)
    needs: [changes, build-backend, build-migrations, build-seed]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    uses: ./.github/workflows/.deployer.yml
    secrets:
      oc_namespace: ${{ secrets.OC_NAMESPACE }}
      oc_token: ${{ secrets.OC_TOKEN }}
      keycloak_url: ${{ secrets.KEYCLOAK_URL }}
      keycloak_realm: ${{ secrets.KEYCLOAK_REALM }}
      keycloak_client_id: ${{ secrets.KEYCLOAK_CLIENT_ID }}
      siteminder_logout_url: ${{ secrets.SITEMINDER_LOGOUT_URL }}
      hmcr_api_url: ${{ secrets.HMCR_API_URL }}
      hmcr_token_url: ${{ secrets.HMCR_TOKEN_URL }}
      hmcr_id: ${{ secrets.HMCR_ID }}
      hmcr_secret: ${{ secrets.HMCR_SECRET }}
      google_maps_client_api_key: ${{ secrets.GOOGLE_MAPS_CLIENT_API_KEY }}
      base_map_style_url: ${{ secrets.BASE_MAP_STYLE_URL }}
      seed_s3_endpoint_url: ${{ secrets.SEED_S3_ENDPOINT_URL }}
      seed_s3_bucket: ${{ secrets.SEED_S3_BUCKET }}
      seed_s3_access_key: ${{ secrets.SEED_S3_ACCESS_KEY }}
      seed_s3_secret_key: ${{ secrets.SEED_S3_SECRET_KEY }}
    with:
      environment: dev
      backend_tag: ${{ inputs.tag || (needs.build-backend.result == 'success' && github.sha || 'latest') }}
      migrations_tag: ${{ inputs.tag || (needs.build-migrations.result == 'success' && github.sha || 'latest') }}
      seed_tag: ${{ inputs.tag || (needs.build-seed.result == 'success' && github.sha || 'latest') }}
      params: --set global.secrets.persist=false --set backend.seed.enabled=true
      db_triggers: ('charts/crunchy/')

  results:
    name: Dev Results
    needs: [build-backend, build-migrations, build-seed, deploy]
    if: always()
    runs-on: ubuntu-slim
    steps:
      - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: echo "At least one job has failed." && exit 1
      - run: echo "Success!"
