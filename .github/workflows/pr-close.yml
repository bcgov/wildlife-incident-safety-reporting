name: PR Closed

on:
  workflow_dispatch:
    inputs:
      pr:
        description: "PR number whose helm release and DB user should be removed"
        type: string
        required: true
  #pull_request:
  #  types: [closed]

concurrency:
  group: pr-${{ inputs.pr }}
  cancel-in-progress: true

permissions: {}

jobs:
  cleanup:
    name: Remove PR-${{ inputs.pr }} helm release
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: bcgov/action-oc-runner@b1c55b8a8bd5f42b19f72e6ea7df6d6a6eda44a1 # v1.5.1
        with:
          oc_namespace: ${{ secrets.OC_NAMESPACE }}
          oc_token: ${{ secrets.OC_TOKEN }}
          oc_server: ${{ vars.oc_server }}
          commands: |
            set -euo pipefail
            RELEASE="${{ github.event.repository.name }}-${{ inputs.pr }}"
            if helm status "${RELEASE}" >/dev/null 2>&1; then
              helm uninstall --no-hooks "${RELEASE}"
            else
              echo "Release ${RELEASE} not found; nothing to remove."
            fi

  cleanup_db:
    name: Remove PR-${{ inputs.pr }} database and user from Crunchy
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - uses: bcgov/action-oc-runner@b1c55b8a8bd5f42b19f72e6ea7df6d6a6eda44a1 # v1.5.1
        with:
          oc_namespace: ${{ secrets.OC_NAMESPACE }}
          oc_token: ${{ secrets.OC_TOKEN }}
          oc_server: ${{ vars.oc_server }}
          commands: |
            set -euo pipefail
            USER="app-${{ inputs.pr }}"
            POD=$(oc get pod -l postgres-operator.crunchydata.com/role=master -o jsonpath='{.items[0].metadata.name}')
            if [ -z "$POD" ]; then
              echo "No master Crunchy pod found; nothing to do."
              exit 0
            fi
            oc exec "$POD" -c database -- psql -U postgres -c "DROP DATABASE IF EXISTS \"$USER\";"
            oc exec "$POD" -c database -- psql -U postgres -c "DROP USER IF EXISTS \"$USER\";"
