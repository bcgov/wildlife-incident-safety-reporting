name: Scheduled

on:
  schedule: [cron: "0 11 * * 6"] # 3 AM PST = 12 PM UDT, Saturdays
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  ageOutPRs:
    name: PR Deployment Purge
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - uses: bcgov/action-oc-runner@d2fc921aaa9d70684c186dbb7754e6985d44d86f # v1.4.1
        with:
          oc_namespace: ${{ secrets.OC_NAMESPACE }}
          oc_token: ${{ secrets.OC_TOKEN }}
          oc_server: ${{ vars.oc_server }}
          commands: |
            set -euo pipefail
            CUTOFF=$(date -u -d "7 days ago" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
                     || date -u -v-7d +%Y-%m-%dT%H:%M:%SZ)
            helm list --namespace "${{ secrets.OC_NAMESPACE }}" \
              --filter "^${{ github.event.repository.name }}-[0-9]+$" \
              --output json | \
              jq -r --arg cutoff "$CUTOFF" \
                '.[] | select(.updated < $cutoff) | .name' | \
            while read -r release; do
              echo "Removing stale release: ${release}"
              helm uninstall --no-hooks "${release}" --namespace "${{ secrets.OC_NAMESPACE }}" || true
            done

  schema-spy:
    name: SchemaSpy
    permissions:
      contents: write
      pages: write
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    services:
      postgres:
        image: postgis/postgis:17-3.4@sha256:d0b5a6ecab18997637f55a83cb4a9467391de5645916cfa1b6f2a8d19eee7be5
        env:
          POSTGRES_DB: wisr
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: .bun-version
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run Kysely migrations
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/wisr
        run: bun run --bun migrations/migrate.ts
      - name: Create output folder
        run: |
          mkdir -p output/schema
          chmod a+rwx -R output
      - name: Run SchemaSpy
        run: docker run --network host -v "$PWD/output:/output" schemaspy/schemaspy:7.0.2@sha256:c8f98116a5cfe4b00b379eeb23b2022cdea4c9192cbccb843a75049e752479b7 -t pgsql11 -db wisr -host 127.0.0.1 -port 5432 -u postgres -p postgres -schemas public
      - name: Deploy to Pages
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4
        with:
          folder: output

  zap:
    name: ZAP Scan
    permissions:
      issues: write
    runs-on: ubuntu-24.04
    steps:
      - uses: zaproxy/action-full-scan@3c58388149901b9a03b7718852c5ba889646c27c # v0.13.0
        with:
          allow_issue_writing: true
          artifact_name: app
          issue_title: "ZAP Security Report"
          token: ${{ secrets.GITHUB_TOKEN }}
          target: https://${{ github.event.repository.name }}-dev.apps.gold.devops.gov.bc.ca/
          fail_action: false
