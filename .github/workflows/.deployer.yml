name: .Helm Deployer

on:
  workflow_call:
    inputs:
      ### Required
      # Only secrets!

      ### Typical / recommended
      atomic:
        description: Atomic deployment?  That means fail all or nothing
        default: false
        required: false
        type: boolean
      directory:
        description: Chart directory
        default: "charts/app"
        required: false
        type: string
      environment:
        description: Environment name; omit for PRs
        required: false
        type: string
      oc_server:
        default: https://api.gold.devops.gov.bc.ca:6443
        description: OpenShift server
        required: false
        type: string
      params:
        description: Extra parameters to pass to helm upgrade
        required: false
        type: string
      backend_tag:
        description: Image tag for the backend container
        required: true
        type: string
      migrations_tag:
        description: Image tag for the migrations init container
        required: true
        type: string
      seed_tag:
        description: Image tag for the seed Job container
        required: true
        type: string
      triggers:
        description: Paths used to trigger a deployment; e.g. ('./backend/' './frontend/)
        required: false
        type: string
      db_user:
        description: The database user
        required: false
        default: "app"
        type: string
      debug:
        description: Debug mode
        default: false
        required: false
        type: boolean
      db_triggers:
        description: Paths used to trigger a database deployment; e.g. ('charts/crunchy/')
        required: false
        type: string

      ### Usually a bad idea / not recommended
      timeout-minutes:
        description: "Timeout minutes"
        default: 10
        required: false
        type: number
      values:
        description: "Values file"
        default: "values.yaml"
        required: false
        type: string

    outputs:
      triggered:
        description: "Has a deployment has been triggered?"
        value: ${{ jobs.deploy.outputs.triggered }}

    secrets:
      oc_namespace:
        description: OpenShift namespace
        required: true
      oc_token:
        description: OpenShift token
        required: true

permissions: {}

jobs:
  deploy:
    name: Stack
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-24.04
    outputs:
      triggered: ${{ steps.deploy.outputs.triggered }}
    steps:
      - uses: bcgov/action-crunchy@2ccf22a61189e72f82728f0cd5d4b2bb9b629ee6 # v2.0.0
        name: Deploy Crunchy
        id: deploy_crunchy
        with:
          oc_namespace: ${{ secrets.OC_NAMESPACE }}
          oc_token: ${{ secrets.OC_TOKEN }}
          oc_server: ${{ inputs.oc_server }}
          environment: ${{ inputs.environment }}
          values_file: >-
            ${{
              inputs.environment == 'prod' && 'charts/crunchy/values-prod.yml' ||
              'charts/crunchy/values.yml'
            }}
          triggers: ${{ inputs.db_triggers }}

      - if: inputs.environment == ''
        id: pr
        uses: bcgov/action-get-pr@bf6c85d0ed23a151f2829956c140fde87979bbf2 # v0.2.0

      - id: vars
        run: |
          release=${{ github.event.repository.name }}-${{ inputs.environment || steps.pr.outputs.pr }}
          version=1.0.0+${{ github.run_number }}
          echo "release=${release}"
          echo "version=${version}"
          echo "release=${release}" >> $GITHUB_OUTPUT
          echo "version=${version}" >> $GITHUB_OUTPUT

      - name: Stop pre-existing deployments on PRs (status = pending-upgrade)
        if: github.event_name == 'pull_request'
        uses: bcgov/action-oc-runner@1815ce17a815c71e9078851a2e3da84d191ea6c3 # v1.5.0
        with:
          oc_namespace: ${{ secrets.oc_namespace }}
          oc_token: ${{ secrets.oc_token }}
          oc_server: ${{ vars.oc_server }}
          triggers: ${{ inputs.triggers }}
          commands: |
            # Interrupt any previous deployments (PR only)
            PREVIOUS=$(helm status ${{ steps.vars.outputs.release }} -o json | jq .info.status || true)
            if [[ ${PREVIOUS} =~ pending ]]; then
              echo "Rollback triggered"
              helm rollback ${{ steps.vars.outputs.release }} || \
                helm uninstall ${{ steps.vars.outputs.release }}
            fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Debug Values File
        if: inputs.debug == 'true'
        run: ls -l charts/crunchy/values.yml

      - name: Helm Deploy
        id: deploy
        uses: bcgov/action-oc-runner@1815ce17a815c71e9078851a2e3da84d191ea6c3 # v1.5.0
        with:
          oc_namespace: ${{ secrets.oc_namespace }}
          oc_token: ${{ secrets.oc_token }}
          oc_server: ${{ vars.oc_server }}
          triggers: ${{ inputs.triggers }}
          ref: ${{ github.ref }}
          commands: |
            set -euo pipefail
            [ -z "${{ inputs.directory }}" ]|| cd ${{ inputs.directory }}

            # Per-environment values overlay; layered on top of base values.yaml
            EXTRA_VALUES=""
            case "${{ inputs.environment }}" in
              test) EXTRA_VALUES="--values values-test.yaml" ;;
              prod) EXTRA_VALUES="--values values-prod.yaml" ;;
            esac

            sed -i 's/^name:.*/name: ${{ github.event.repository.name }}/' Chart.yaml
            helm package -u . --app-version="backend-${{ inputs.backend_tag }}_run-${{ github.run_number }}" --version=${{ steps.pr.outputs.pr || steps.vars.outputs.version }}
            helm upgrade \
              --set-string global.repository=${{ github.repository }} \
              --set-string backend.image.tag="${{ inputs.backend_tag }}" \
              --set-string migrations.image.tag="${{ inputs.migrations_tag }}" \
              --set-string seed.image.tag="${{ inputs.seed_tag }}" \
              --set-string global.config.databaseUser="${{ inputs.db_user }}" \
              --set-string global.databaseAlias="${{ steps.deploy_crunchy.outputs.release }}-crunchy" \
              ${{ inputs.params }} \
              --install --wait ${{ inputs.atomic && '--atomic' || '' }} ${{ steps.vars.outputs.release }} \
              --timeout ${{ inputs.timeout-minutes }}m \
              --values ${{ inputs.values }} \
              ${EXTRA_VALUES} \
              ./${{ github.event.repository.name }}-${{ steps.pr.outputs.pr || steps.vars.outputs.version }}.tgz

            # Helm release history
            helm history ${{ steps.vars.outputs.release }}

            # Completed pod cleanup
            oc delete po --field-selector=status.phase==Succeeded || true
